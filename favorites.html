<section class="container home">
  <h1>Your Favorite Recipes</h1>
  <p class="home__lead">Recipes you've saved with the heart button. Saved locally in your browser.</p>
  <div class="recipe-grid" id="favorites-grid"></div>
  <p class="recipe-grid__empty" id="favorites-empty">You haven't saved any recipes yet.</p>
</section>

{% include search-bar.html %}

<script>
document.addEventListener("DOMContentLoaded", function () {
  var grid = document.getElementById("favorites-grid");
  var empty = document.getElementById("favorites-empty");
  if (!grid || !window.RecipeFavorites) return;

  var favIds = window.RecipeFavorites.getFavorites();
  if (!favIds.length) { empty.hidden = false; return; }

  var data = (document.getElementById("recipes-data") &&
    JSON.parse(document.getElementById("recipes-data").textContent)) || [];

  var favRecipes = data.filter(function (r) {
    return favIds.indexOf(r.id) !== -1 || favIds.indexOf(r.url) !== -1;
  });

  if (!favRecipes.length) {
    empty.hidden = false;
    empty.textContent = "Saved recipes will appear here once they are loaded from the homepage.";
    return;
  }

  favRecipes.forEach(function (r) {
    var card = document.createElement("article");
    card.className = "recipe-card";
    card.innerHTML =
      '<a class="recipe-card__link" href="' + r.url + '">' +
        '<div class="recipe-card__media">' +
          (r.image ? '<img class="recipe-card__img" src="' + r.image + '" alt="' + r.title + '" loading="lazy">' : '<div class="recipe-card__img recipe-card__img--placeholder"></div>') +
        '</div>' +
        '<div class="recipe-card__body">' +
          '<h2 class="recipe-card__title">' + r.title + '</h2>' +
        '</div>' +
      '</a>';
    grid.appendChild(card);
  });
});
</script>
