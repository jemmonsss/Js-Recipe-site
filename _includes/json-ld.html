<script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "Recipe",
  "name": {{ page.title | jsonify }},
  "description": {{ page.description | default: site.description | jsonify }},
  "image": {{ page.image | absolute_url | jsonify }},
  "author": {
    "@type": "Person",
    "name": {{ page.author | default: site.author | jsonify }}
  },
  "prepTime": "PT{{ page.prep_time | default: 0 }}M",
  "cookTime": "PT{{ page.cook_time | default: 0 }}M",
  "totalTime": "PT{{ page.prep_time | default: 0 | plus: page.cook_time | default: 0 }}M",
  "recipeYield": "{{ page.servings | default: 4 }}",
  "recipeCategory": {{ page.categories | first | default: 'General' | jsonify }},
  "recipeCuisine": {{ page.categories | last | default: 'General' | jsonify }},
  "recipeIngredient": {{ page.ingredients | jsonify }},
  "recipeInstructions": [
    {% for step in page.steps %}
    {
      "@type": "HowToStep",
      "text": {{ step | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
