<form class="search-bar" role="search" aria-label="Search recipes">
  <label class="visually-hidden" for="search-input">Search recipes</label>
  <input class="search-bar__input" id="search-input" type="search" placeholder="Search by title, ingredient, or tag…" autocomplete="off">
  <button class="search-bar__clear" id="search-clear" type="button" aria-label="Clear search" hidden>&times;</button>
</form>

<script type="application/json" id="recipes-data">
  [
    {% for recipe in site.recipes %}
    {
      "title": {{ recipe.title | jsonify }},
      "url": {{ recipe.url | relative_url | jsonify }},
      "id": {{ recipe.path | slugify | jsonify }},
      "image": {{ recipe.image | relative_url | jsonify }},
      "categories": {{ recipe.categories | jsonify }},
      "tags": {{ recipe.tags | jsonify }},
      "ingredients": {{ recipe.ingredients | jsonify }},
      "search": {{ recipe.title | append: ' ' | append: recipe.ingredients | join: ' ' | append: ' ' | append: recipe.tags | downcase | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
</script>
