<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="{{ site.color_scheme.primary }}">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% include head.html %}
  </head>
  <body class="viewport-unknown">
    <a class="skip-link" href="#main">Skip to content</a>
    {% include header.html %}
    <main id="main" role="main">
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
    {% if site.features.search %}<script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>{% endif %}
    {% if site.features.favorites %}<script src="{{ '/assets/js/favorites.js' | relative_url }}" defer></script>{% endif %}
    {% if site.features.servings_calculator %}<script src="{{ '/assets/js/servings.js' | relative_url }}" defer></script>{% endif %}
    <script src="{{ '/assets/js/responsive.js' | relative_url }}" defer></script>
  </body>
</html>
